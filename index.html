<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Automation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div>
        <h2>Email Automation</h2>
        <p>Gmail API Powered</p>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-item active" onclick="showTab('send', this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send Email
      </div>
      <div class="nav-item" onclick="showTab('schedule', this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Schedule Email
      </div>
      <div class="nav-item" onclick="showTab('logs', this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Email Logs
      </div>
    </nav>

    <div class="sidebar-stats">
      <div class="stat-box">
        <span id="statTotal">0</span>
        <p>Total Sent</p>
      </div>
      <div class="stat-box">
        <span id="statScheduled">0</span>
        <p>Scheduled</p>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <h3 id="pageTitle">Send Email</h3>
        <p id="pageSubtitle">Send an email immediately via Gmail</p>
      </div>
      <div class="topbar-badge">
        <span class="badge-dot"></span> Live
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- ══ TAB: SEND ══ -->
    <div class="tab-content active" id="tab-send">
      <div class="card">
        <div class="card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Compose & Send
        </div>
        <div class="form-group">
          <label>To (Recipient Email)</label>
          <input type="email" id="sendTo" placeholder="recipient@example.com"/>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="sendSubject" placeholder="Email subject..."/>
        </div>
        <div class="form-group">
          <label>Message Body</label>
          <textarea id="sendBody" rows="6" placeholder="Write your email message here..."></textarea>
        </div>
        <button class="btn btn-primary" id="sendBtn" onclick="sendNow()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send Email Now
        </button>
      </div>
    </div>

    <!-- ══ TAB: SCHEDULE ══ -->
    <div class="tab-content" id="tab-schedule">
      <div class="card">
        <div class="card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Schedule an Email
        </div>
        <div class="form-group">
          <label>To (Recipient Email)</label>
          <input type="email" id="schedTo" placeholder="recipient@example.com"/>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="schedSubject" placeholder="Email subject..."/>
        </div>
        <div class="form-group">
          <label>Message Body</label>
          <textarea id="schedBody" rows="5" placeholder="Write your email message here..."></textarea>
        </div>
        <div class="form-group">
          <label>Schedule Date & Time</label>
          <input type="datetime-local" id="schedTime"/>
        </div>
        <button class="btn btn-primary" id="schedBtn" onclick="scheduleEmail()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Schedule Email
        </button>
      </div>

      <!-- Pending scheduled jobs -->
      <div class="card" style="margin-top:16px;">
        <div class="card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Pending Scheduled Emails
        </div>
        <div id="pendingList"><p class="empty-msg">No scheduled emails pending.</p></div>
      </div>
    </div>

    <!-- ══ TAB: LOGS ══ -->
    <div class="tab-content" id="tab-logs">
      <div class="card">
        <div class="card-header" style="justify-content:space-between;">
          <span style="display:flex;align-items:center;gap:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Email History Log
          </span>
          <button class="btn-sm" onclick="loadLogs()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.03-5.22"/></svg>
            Refresh
          </button>
        </div>
        <div id="logsList"><p class="empty-msg">Loading logs...</p></div>
      </div>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
